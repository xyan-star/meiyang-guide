<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>美羊AI学习力系统新手向导</title>
  <link rel="icon" href="https://www.meiyangxuexili.com/favicon.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- Element Plus -->
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <style>
    :root {
      --primary: #409EFF;
      --primary-light: #66B1FF;
      --primary-dark: #3A8EE6;
      --primary-bg: #ECF5FF;
      --success: #67C23A;
      --warning: #E6A23C;
      --danger: #F56C6C;
      --text: #303133;
      --text-2: #606266;
      --text-3: #909399;
      --text-4: #C0C4CC;
      --border: #DCDFE6;
      --border-l: #E4E7ED;
      --border-xl: #EBEEF5;
      --bg: #F0F2F5;
      --bg-white: #FFFFFF;
      --shadow: 0 2px 12px 0 rgba(0,0,0,0.06);
      --radius: 12px;
      --radius-sm: 8px;
      --font: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      font-size: 16px;
    }
    body { overflow-x: hidden; overflow-y: auto; }

    /* ===== App Shell ===== */
    .app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 100%;
      margin: 0 auto;
      background: var(--bg);
    }

    /* ===== Header ===== */
    .header {
      background: linear-gradient(135deg, #2B3A4A 0%, #304156 100%);
      display: flex;
      align-items: center;
      padding: 14px 20px;
      flex-shrink: 0;
      z-index: 20;
    }
    .header .logo-area {
      display: flex;
      align-items: center;
    }
    .header .logo-area img {
      height: 32px;
      vertical-align: middle;
    }

    /* ===== Main Content ===== */
    .main {
      flex: 1;
      padding: 20px 16px 30px;
      overflow-y: auto;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }

    /* ===== Welcome Card ===== */
    .welcome-card {
      background: var(--bg-white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 20px;
    }
    .welcome-card .welcome-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: linear-gradient(135deg, #409EFF, #66B1FF);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      margin-bottom: 12px;
    }
    .welcome-card h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    .welcome-card .welcome-desc {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.8;
    }
    .welcome-card .team-tag {
      display: inline-block;
      margin-top: 10px;
      font-size: 12px;
      color: var(--primary);
      background: var(--primary-bg);
      padding: 2px 10px;
      border-radius: 4px;
    }

    /* ===== Action Cards Grid ===== */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 480px) {
      .action-grid {
        grid-template-columns: 1fr;
      }
    }

    .action-card {
      background: var(--bg-white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 16px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-decoration: none;
      color: var(--text);
      border: none;
      width: 100%;
      text-align: left;
      font-family: var(--font);
      font-size: 14px;
    }
    .action-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px 0 rgba(0,0,0,0.08);
    }
    .action-card .ac-icon {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #fff;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .action-card .ac-icon.c1 { background: linear-gradient(135deg, #409EFF, #66B1FF); }
    .action-card .ac-icon.c2 { background: linear-gradient(135deg, #67C23A, #85CE61); }
    .action-card .ac-icon.c3 { background: linear-gradient(135deg, #E6A23C, #EBB563); }
    .action-card .ac-icon.c4 { background: linear-gradient(135deg, #F56C6C, #F89898); }
    .action-card .ac-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .action-card .ac-desc {
      font-size: 12px;
      color: var(--text-3);
      line-height: 1.5;
    }

    /* ===== Footer ===== */
    .footer {
      text-align: center;
      padding: 6px 16px 24px;
      font-size: 12px;
      color: var(--text-4);
      flex-shrink: 0;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }

    /* ===== Modal Links ===== */
    .modal-link-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      margin: 8px 0;
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text);
      text-decoration: none;
      background: var(--bg);
      transition: all 0.25s ease;
      border: 1px solid var(--border-xl);
    }
    .modal-link-item:hover {
      background: var(--primary-bg);
      border-color: var(--primary-light);
      color: var(--primary);
      transform: translateX(2px);
    }
    .modal-link-item .ml-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #fff;
      flex-shrink: 0;
    }
    .modal-link-item .ml-icon.m1 { background: linear-gradient(135deg, #409EFF, #66B1FF); }
    .modal-link-item .ml-icon.m2 { background: linear-gradient(135deg, #67C23A, #85CE61); }
    .modal-link-item .ml-icon.m3 { background: linear-gradient(135deg, #F56C6C, #F89898); }
    .modal-link-item:hover .ml-icon { transform: scale(1.05); }

    .modal-note {
      margin-top: 14px;
      padding: 10px 14px;
      background: #FFF7E6;
      border: 1px solid #FAE0A4;
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: #B88230;
      line-height: 1.6;
    }
    .modal-note i {
      margin-right: 4px;
      color: #E6A23C;
    }

    /* ===== El Dialog Override ===== */
    .el-dialog {
      border-radius: 14px !important;
    }
    .el-dialog__header {
      padding: 20px 20px 10px !important;
    }
    .el-dialog__title {
      font-family: var(--font) !important;
      font-weight: 600 !important;
      font-size: 17px !important;
      color: var(--text) !important;
    }
    .el-dialog__body {
      padding: 6px 20px 20px !important;
    }
    .el-overlay {
      background-color: rgba(0,0,0,0.4) !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app">
      <!-- Header -->
      <div class="header">
        <div class="logo-area">
          <img src="https://www.meiyangxuexili.com/agent/img/jst_logo.Bs_ur0mu.png" alt="美羊AI学习力系统" />
        </div>
      </div>

      <!-- Main Content -->
      <div class="main">
        <!-- Welcome -->
        <div class="welcome-card">
          <div class="welcome-icon"><i class="fas fa-star"></i></div>
          <h2>欢迎使用美羊AI学习力系统</h2>
          <p class="welcome-desc">
            美羊AI学习力系统是由北京师范大学杨娟教授及其团队亲历打造的一款以"让每个孩子学会学习，爱上学习"为主旨的智能化教育平台
          </p>
          <span class="team-tag">北师大杨娟教授团队</span>
        </div>

        <!-- Action Cards -->
        <div class="action-grid">
          <!-- 1. 注册 -->
          <button class="action-card" @click="registerDialogVisible = true">
            <div class="ac-icon c1"><i class="fas fa-user-plus"></i></div>
            <div class="ac-name">注册账号</div>
            <div class="ac-desc">创建美羊AI学习力系统教师账号</div>
          </button>

          <!-- 2. 登录 -->
          <button class="action-card" @click="openLink('https://www.meiyangxuexili.com/agent/#/login')">
            <div class="ac-icon c2"><i class="fas fa-sign-in-alt"></i></div>
            <div class="ac-name">系统登录</div>
            <div class="ac-desc">登录美羊AI学习力系统后台</div>
          </button>

          <!-- 3. 快速了解（弹窗） -->
          <button class="action-card" @click="dialogVisible = true">
            <div class="ac-icon c3"><i class="fas fa-book-open"></i></div>
            <div class="ac-name">快速了解</div>
            <div class="ac-desc">查看教师/学生操作手册及汇享资源</div>
          </button>

          <!-- 4. 系统功能导览 -->
          <button class="action-card" @click="openLink('https://xyan-star.github.io/meiyang-study/')">
            <div class="ac-icon c4"><i class="fas fa-compass"></i></div>
            <div class="ac-name">功能导览</div>
            <div class="ac-desc">浏览美羊AI学习力系统全部功能</div>
          </button>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        北京师范大学杨娟教授团队 · 让每个孩子学会学习，爱上学习
      </div>
    </div>

    <!-- Modal: 快速了解 -->
    <el-dialog
      v-model="dialogVisible"
      title="快速了解美羊系统"
      width="420px"
      :close-on-click-modal="true"
      center
    >
      <a class="modal-link-item" :href="manualLinks.teacher" target="_blank">
        <div class="ml-icon m1"><i class="fas fa-file-alt"></i></div>
        <div>
          <div style="font-weight:600;margin-bottom:2px">学习力系统测评获客招生指南</div>
          <div style="font-size:12px;color:var(--text-3)">招生获客指南</div>
        </div>
      </a>
      <a class="modal-link-item" :href="manualLinks.student" target="_blank">
        <div class="ml-icon m2"><i class="fas fa-user-graduate"></i></div>
        <div>
          <div style="font-weight:600;margin-bottom:2px">读懂测评报告，赋能学生成长</div>
          <div style="font-size:12px;color:var(--text-3)">学习力测评解读</div>
        </div>
      </a>
      <a class="modal-link-item" :href="manualLinks.resource" target="_blank">
        <div class="ml-icon m3"><i class="fas fa-layer-group"></i></div>
        <div>
          <div style="font-weight:600;margin-bottom:2px">汇享资源</div>
          <div style="font-size:12px;color:var(--text-3)">培训视频、招生海报、门店设计等优质资源</div>
        </div>
      </a>
      <div class="modal-note">
        <i class="fas fa-info-circle"></i>教学视频存放于第三方平台，与美羊系统账号不同，推荐使用微信快速注册。
      </div>
    </el-dialog>

    <!-- Modal: 注册提示 -->
    <el-dialog
      v-model="registerDialogVisible"
      title="温馨提示"
      width="420px"
      :close-on-click-modal="true"
      center
    >
      <div class="modal-note" style="margin-top:0;margin-bottom:18px">
        <i class="fas fa-info-circle"></i>申请注册后，请联系杨扬·美羊运营官进行账号开通
      </div>
      <div style="text-align:center">
        <el-button type="primary" @click="sendWecomNotify(); openLink('https://www.meiyangxuexili.com/#/register?role=teacher&pid=3856'); registerDialogVisible = false" round>
          前往注册
        </el-button>
        <el-button @click="registerDialogVisible = false" round>取消</el-button>
      </div>
    </el-dialog>
  </div>

  <!-- Vue 3 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <!-- Element Plus -->
  <script src="https://unpkg.com/element-plus"></script>

  <script>
    const { createApp, ref } = Vue

    const app = createApp({
      setup() {
        const dialogVisible = ref(false)
        const registerDialogVisible = ref(false)

        const manualLinks = {
          teacher: 'https://i3g7m.xetlk.com/sl/2E7OFf',
          student: 'https://i3g7m.xetlk.com/sl/2YGEIa',
          resource: 'https://www.meiyangxuexili.com/agent/#/news/index?type=2'
        }

        const openLink = (url) => {
          window.open(url, '_blank')
        }

        // 企业微信机器人推送
        const WECOM_WEBHOOK = 'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=6c88fc3a-577d-4d74-acc5-6349a5b128e9'

        const sendWecomNotify = () => {
          const now = new Date()
          const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`
          const ua = navigator.userAgent
          const browser = ua.includes('Chrome') ? 'Chrome' : ua.includes('Firefox') ? 'Firefox' : ua.includes('Safari') ? 'Safari' : '其他'
          const os = ua.includes('Windows') ? 'Windows' : ua.includes('Mac') ? 'Mac' : ua.includes('Linux') ? 'Linux' : '其他'

          const payload = {
            msgtype: 'markdown',
            markdown: {
              content: `### 📬 美羊新手向导通知\n> **有人点击了「前往注册」**\n\n**时间：** ${timeStr}\n**浏览器：** ${browser}\n**系统：** ${os}\n**页面：** 美羊AI学习力系统新手向导`
            }
          }

          fetch(WECOM_WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          }).catch(() => {})
        }

        return { dialogVisible, registerDialogVisible, manualLinks, openLink, sendWecomNotify }
      }
    })

    app.use(ElementPlus)
    app.mount('#app')
  </script>
</body>
</html>
