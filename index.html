<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>美羊AI学习力系统新手向导</title>
  <link rel="icon" href="https://www.meiyangxuexili.com/favicon.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- Element Plus -->
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <style>
    :root {
      --primary: #409EFF;
      --primary-light: #66B1FF;
      --primary-dark: #3A8EE6;
      --primary-bg: #ECF5FF;
      --success: #67C23A;
      --warning: #E6A23C;
      --danger: #F56C6C;
      --text: #303133;
      --text-2: #606266;
      --text-3: #909399;
      --text-4: #C0C4CC;
      --border: #DCDFE6;
      --border-l: #E4E7ED;
      --border-xl: #EBEEF5;
      --bg: #F0F2F5;
      --bg-white: #FFFFFF;
      --shadow: 0 2px 12px 0 rgba(0,0,0,0.06);
      --radius: 12px;
      --radius-sm: 8px;
      --font: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      font-size: 16px;
    }
    body { overflow-x: hidden; overflow-y: auto; }

    /* ===== App Shell ===== */
    .app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 100%;
      margin: 0 auto;
      background: var(--bg);
    }

    /* ===== Header ===== */
    .header {
      background: linear-gradient(135deg, #2B3A4A 0%, #304156 100%);
      display: flex;
      align-items: center;
      padding: 14px 20px;
      flex-shrink: 0;
      z-index: 20;
    }
    .header .logo-area {
      display: flex;
      align-items: center;
    }
    .header .logo-area img {
      height: 32px;
      vertical-align: middle;
    }

    /* ===== Main Content ===== */
    .main {
      flex: 1;
      padding: 20px 16px 30px;
      overflow-y: auto;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }

    /* ===== Welcome Card ===== */
    .welcome-card {
      background: var(--bg-white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 20px;
    }
    .welcome-card .welcome-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: linear-gradient(135deg, #409EFF, #66B1FF);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      margin-bottom: 12px;
    }
    .welcome-card h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    .welcome-card .welcome-desc {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.8;
    }
    .welcome-card .team-tag {
      display: inline-block;
      margin-top: 10px;
      font-size: 12px;
      color: var(--primary);
      background: var(--primary-bg);
      padding: 2px 10px;
      border-radius: 4px;
    }

    /* ===== Section Tag ===== */
    .section-tag {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-2);
      margin-bottom: 12px;
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-tag:first-child { margin-top: 0; }
    .section-tag i { font-size: 14px; }
    .section-tag .st-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
    }
    .st-badge.beginner { background: linear-gradient(135deg, #409EFF, #66B1FF); }
    .st-badge.quick { background: linear-gradient(135deg, #67C23A, #85CE61); }
    .st-badge.advanced { background: linear-gradient(135deg, #E6A23C, #EBB563); }

    /* ===== Action Cards Grid ===== */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 480px) {
      .action-grid {
        grid-template-columns: 1fr;
      }
    }

    .action-card {
      background: var(--bg-white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 16px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-decoration: none;
      color: var(--text);
      border: none;
      width: 100%;
      text-align: left;
      font-family: var(--font);
      font-size: 14px;
    }
    .action-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px 0 rgba(0,0,0,0.08);
    }
    .action-card .ac-icon {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #fff;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .action-card .ac-icon.c1 { background: linear-gradient(135deg, #409EFF, #66B1FF); }
    .action-card .ac-icon.c2 { background: linear-gradient(135deg, #67C23A, #85CE61); }
    .action-card .ac-icon.c3 { background: linear-gradient(135deg, #E6A23C, #EBB563); }
    .action-card .ac-icon.c4 { background: linear-gradient(135deg, #F56C6C, #F89898); }
    .action-card .ac-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .action-card .ac-desc {
      font-size: 12px;
      color: var(--text-3);
      line-height: 1.5;
    }

    /* ===== Footer ===== */
    .footer {
      text-align: center;
      padding: 6px 16px 24px;
      font-size: 12px;
      color: var(--text-4);
      flex-shrink: 0;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }

    /* ===== Modal Links ===== */
    .modal-link-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      margin: 8px 0;
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text);
      text-decoration: none;
      background: var(--bg);
      transition: all 0.25s ease;
      border: 1px solid var(--border-xl);
    }
    .modal-link-item:hover {
      background: var(--primary-bg);
      border-color: var(--primary-light);
      color: var(--primary);
      transform: translateX(2px);
    }
    .modal-link-item .ml-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #fff;
      flex-shrink: 0;
    }
    .modal-link-item .ml-icon.m1 { background: linear-gradient(135deg, #409EFF, #66B1FF); }
    .modal-link-item .ml-icon.m2 { background: linear-gradient(135deg, #67C23A, #85CE61); }
    .modal-link-item .ml-icon.m3 { background: linear-gradient(135deg, #F56C6C, #F89898); }
    .modal-link-item:hover .ml-icon { transform: scale(1.05); }

    .modal-note {
      margin-top: 14px;
      padding: 10px 14px;
      background: #FFF7E6;
      border: 1px solid #FAE0A4;
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: #B88230;
      line-height: 1.6;
    }
    .modal-note i {
      margin-right: 4px;
      color: #E6A23C;
    }

    /* ===== El Dialog Override ===== */
    .el-dialog {
      border-radius: 14px !important;
    }
    .el-dialog__header {
      padding: 20px 20px 10px !important;
    }
    .el-dialog__title {
      font-family: var(--font) !important;
      font-weight: 600 !important;
      font-size: 17px !important;
      color: var(--text) !important;
    }
    .el-dialog__body {
      padding: 6px 20px 20px !important;
    }
    .el-overlay {
      background-color: rgba(0,0,0,0.4) !important;
    }

    /* ===== Test Pages ===== */
    .test-page {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Reward Banner */
    .reward-banner {
      background: linear-gradient(135deg, #FFF7E6, #FFF1CC);
      border: 1px solid #F5D47A;
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: fadeIn 0.4s ease;
    }
    .rb-icon { font-size: 32px; flex-shrink: 0; }
    .rb-title { font-size: 14px; color: #8B6914; line-height: 1.5; }
    .rb-title strong { color: #D48806; }
    .rb-sub { font-size: 12px; color: #A68A3C; margin-top: 4px; }

    /* Quiz Card Badge */
    .qc-badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px;
      vertical-align: middle;
      font-weight: 600;
    }
    .qc-badge.pass { background: #E8F5E9; color: #2E7D32; }
    .qc-badge.fail { background: #FFF3E0; color: #E65100; }

    .test-section-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .test-section-title i { color: var(--primary); font-size: 20px; }

    /* Back Button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-3);
      cursor: pointer;
      padding: 8px 14px;
      border-radius: 20px;
      background: var(--bg-white);
      border: 1px solid var(--border);
      transition: all 0.2s;
      margin-bottom: 16px;
      font-family: var(--font);
    }
    .back-btn:hover { color: var(--primary); border-color: var(--primary-light); background: var(--primary-bg); }

    /* Quiz List Cards */
    .quiz-list { display: flex; flex-direction: column; gap: 14px; }
    .quiz-card {
      background: var(--bg-white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      cursor: pointer;
      transition: all 0.25s ease;
      border-left: 4px solid var(--primary);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .quiz-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
    .quiz-card .qc-icon {
      width: 50px; height: 50px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: #fff; flex-shrink: 0;
    }
    .quiz-card .qc-icon.q1 { background: linear-gradient(135deg, #409EFF, #66B1FF); }
    .quiz-card .qc-icon.q2 { background: linear-gradient(135deg, #67C23A, #85CE61); }
    .quiz-card .qc-icon.q3 { background: linear-gradient(135deg, #E6A23C, #EBB563); }
    .quiz-card .qc-icon.q4 { background: linear-gradient(135deg, #9B59B6, #BB8FCE); }
    .quiz-card .qc-info { flex: 1; min-width: 0; }
    .quiz-card .qc-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .quiz-card .qc-desc { font-size: 12px; color: var(--text-3); }
    .quiz-card .qc-arrow { color: var(--text-4); font-size: 16px; flex-shrink: 0; }

    /* Quiz Taking Page */
    .quiz-header {
      background: var(--bg-white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .quiz-header .qh-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .quiz-header .qh-progress { font-size: 13px; color: var(--primary); font-weight: 500; }

    /* User Info Form */
    .user-info-form {
      background: var(--bg-white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 16px;
    }
    .user-info-form .uif-title {
      font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }
    .user-info-form .uif-title i { color: var(--primary); }
    .user-info-form .uif-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    @media (max-width: 480px) {
      .user-info-form .uif-row { grid-template-columns: 1fr; }
    }
    .uif-input {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 14px; font-family: var(--font); color: var(--text);
      outline: none; transition: border-color 0.2s; background: var(--bg);
    }
    .uif-input:focus { border-color: var(--primary); }
    .uif-input::placeholder { color: var(--text-4); }

    /* Question Block */
    .question-block {
      background: var(--bg-white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 14px;
      transition: all 0.2s;
    }
    .question-block.answered { border-left: 3px solid var(--success); }
    .question-block .qb-num {
      display: inline-flex;
      align-items: center; justify-content: center;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--primary-bg);
      color: var(--primary);
      font-size: 13px; font-weight: 700;
      margin-bottom: 10px;
    }
    .question-block .qb-type {
      display: inline-block;
      font-size: 11px; color: var(--text-3);
      background: var(--bg);
      padding: 2px 8px; border-radius: 4px;
      margin-left: 8px;
    }
    .question-block .qb-text {
      font-size: 15px; font-weight: 500; color: var(--text);
      line-height: 1.6; margin-bottom: 14px;
    }

    /* Options */
    .option-list { display: flex; flex-direction: column; gap: 8px; }
    .option-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      border: 2px solid var(--border-l);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px; color: var(--text-2);
      font-family: var(--font);
      text-align: left;
      width: 100%;
      background: var(--bg-white);
    }
    .option-item:hover { border-color: var(--primary-light); background: var(--primary-bg); }
    .option-item.selected {
      border-color: var(--primary); background: var(--primary-bg); color: var(--primary); font-weight: 500;
    }
    .option-item .oi-radio {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .option-item.selected .oi-radio {
      border-color: var(--primary); background: var(--primary);
    }
    .option-item.selected .oi-radio::after {
      content: ''; width: 8px; height: 8px; border-radius: 50%; background: #fff;
    }

    /* Submit Button */
    .submit-area {
      text-align: center;
      padding: 20px 0;
    }
    .submit-btn {
      padding: 14px 48px;
      font-size: 16px; font-weight: 600;
      border: none; border-radius: 28px;
      background: linear-gradient(135deg, #409EFF, #66B1FF);
      color: #fff; cursor: pointer;
      transition: all 0.25s;
      font-family: var(--font);
      box-shadow: 0 4px 14px rgba(64,158,255,0.35);
    }
    .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(64,158,255,0.45); }
    .submit-btn:disabled { background: var(--border); box-shadow: none; cursor: not-allowed; }

    /* Result Page */
    .result-card {
      background: var(--bg-white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 30px 20px;
      text-align: center;
      margin-bottom: 20px;
    }
    .score-circle {
      width: 120px; height: 120px;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-weight: 700;
    }
    .score-circle.pass { background: linear-gradient(135deg, #E1F3D8, #C6E9B4); color: #529B2E; }
    .score-circle.fail { background: linear-gradient(135deg, #FDE2E2, #FAB6B6); color: #D14343; }
    .score-circle .sc-num { font-size: 36px; line-height: 1; }
    .score-circle .sc-label { font-size: 12px; margin-top: 2px; }
    .result-card .rc-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .result-card .rc-detail { font-size: 13px; color: var(--text-3); margin-bottom: 20px; line-height: 1.8; }
    .result-card .rc-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .rc-btn {
      padding: 10px 24px;
      border-radius: 22px; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all 0.2s; font-family: var(--font);
      border: 1px solid var(--border);
      background: var(--bg-white); color: var(--text-2);
    }
    .rc-btn:hover { border-color: var(--primary); color: var(--primary); }
    .rc-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .rc-btn.primary:hover { background: var(--primary-dark); }

    /* Answer Review */
    .review-section { margin-top: 20px; }
    .review-section .rs-title {
      font-size: 15px; font-weight: 600; color: var(--text);
      margin-bottom: 12px; text-align: left;
      display: flex; align-items: center; gap: 8px;
    }
    .review-item {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-bottom: 10px;
      text-align: left;
      border-left: 3px solid var(--border);
      font-size: 13px; line-height: 1.6;
    }
    .review-item.correct { border-left-color: var(--success); background: #F0F9EB; }
    .review-item.wrong { border-left-color: var(--danger); background: #FEF0F0; }
    .review-item .ri-q { color: var(--text); font-weight: 500; margin-bottom: 4px; }
    .review-item .ri-a { color: var(--text-3); }
    .review-item .ri-a span { font-weight: 600; }
    .review-item .ri-a span.correct-answer { color: var(--success); }
    .review-item .ri-a span.wrong-answer { color: var(--danger); }

    /* Empty state */
    .test-empty {
      text-align: center; padding: 40px 20px; color: var(--text-3);
    }
    .test-empty i { font-size: 40px; margin-bottom: 12px; display: block; }
  </style>
</head>
<body>
  <div id="app">
    <div class="app">
      <!-- Header -->
      <div class="header">
        <div class="logo-area">
          <img src="https://www.meiyangxuexili.com/agent/img/jst_logo.Bs_ur0mu.png" alt="美羊AI学习力系统" />
        </div>
      </div>

      <!-- Main Content -->
      <div class="main">

        <!-- ===== HOME PAGE ===== -->
        <template v-if="page === 'home'">
          <!-- Welcome -->
          <div class="welcome-card">
            <div class="welcome-icon"><i class="fas fa-star"></i></div>
            <h2>欢迎使用美羊AI学习力系统</h2>
            <p class="welcome-desc">
              美羊AI学习力系统是由北京师范大学杨娟教授及其团队亲历打造的一款以"让每个孩子学会学习，爱上学习"为主旨的智能化教育平台
            </p>
            <span class="team-tag">北师大杨娟教授团队</span>
          </div>

          <!-- Action Cards -->
          <!-- 新手上路 -->
          <div class="section-tag">
            <span class="st-badge beginner">新手上路</span> 从这里开始
          </div>
          <div class="action-grid">
            <button class="action-card" @click="registerDialogVisible = true">
              <div class="ac-icon c1"><i class="fas fa-user-plus"></i></div>
              <div class="ac-name">注册账号</div>
              <div class="ac-desc">创建美羊AI学习力系统教师账号</div>
            </button>

            <button class="action-card" @click="openLink('https://www.meiyangxuexili.com/agent/#/login')">
              <div class="ac-icon c2"><i class="fas fa-sign-in-alt"></i></div>
              <div class="ac-name">系统登录</div>
              <div class="ac-desc">登录美羊AI学习力系统后台</div>
            </button>
          </div>

          <!-- 快速上手 -->
          <div class="section-tag">
            <span class="st-badge quick">快速上手</span> 了解系统
          </div>
          <div class="action-grid">
            <button class="action-card" @click="dialogVisible = true">
              <div class="ac-icon c3"><i class="fas fa-book-open"></i></div>
              <div class="ac-name">快速了解</div>
              <div class="ac-desc">查看教师/学生操作手册及汇享资源</div>
            </button>

            <button class="action-card" @click="openLink('https://www.meiyangxuexili.com/guide.html')">
              <div class="ac-icon c4"><i class="fas fa-compass"></i></div>
              <div class="ac-name">系统展示</div>

          { type:'single', text:'学生填写的【学习状态跟踪本】中，不包含哪项内容？', options:['情绪状态','精力状态','学习效率','家庭环境'], answer:3 },
          { type:'single', text:'【学习状态跟踪本】中，学习效率记录表主要记录的是：', options:['上课效率、作业效率、整体效率','阅读速度、背诵速度、书写速度','预习情况、复习情况、考试情况','课堂纪律、作业态度、专注时长'], answer:0 },
          { type:'single', text:'标准化的1V1视频课上课流程中，以下流程中错误的是', options:['状态复盘：需要对情绪状态，精力状态，学习效率等状态进行复盘','作业复盘：完成的不好的作业需要进行复盘，完成好的作业不需要复盘','视频课观看：观看过程中，需要经常暂停视频，与学生讨论视频课相关内容','总结行动：对本次课的收获进行总结，并做好下一步行动安排'], answer:1 },
          { type:'tf', text:'学习力测评结束后，所有学生推荐的课程都是一样的', options:['正确','错误'], answer:1 },
          { type:'tf', text:'上课流程只需要复盘作业，不需要复盘学习状态', options:['正确','错误'], answer:1 },
          { type:'tf', text:'【学习状态跟踪本】可以每天记录学生状态，每周形成变化曲线', options:['正确','错误'], answer:0 },
          { type:'tf', text:'上视频课时，老师全程只需要在一旁看着，不需要和学生交流互动', options:['正确','错误'], answer:1 },
          { type:'tf', text:'舒尔特方格是美羊学习力工具盒中包含的专注力训练工具', options:['正确','错误'], answer:0 }
        ]
      }
    ]

    const app = createApp({
      setup() {
        const dialogVisible = ref(false)
        const registerDialogVisible = ref(false)
        const feedbackDialogVisible = ref(false)
        const feedbackName = ref('')
        const feedbackPhone = ref('')
        const feedbackContent = ref('')
        const feedbackSubmitting = ref(false)
        const feedbackQrVisible = ref(false)

        const manualLinks = {
          teacher: 'https://i3g7m.xetlk.com/sl/2E7OFf',
          student: 'https://i3g7m.xetlk.com/sl/2YGEIa',
          resource: 'https://www.meiyangxuexili.com/agent/#/news/index?type=2'
        }

        const openLink = (url) => {
          window.open(url, '_blank')
        }

        // 企业微信机器人推送
        const WECOM_WEBHOOK = 'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=6c88fc3a-577d-4d74-acc5-6349a5b128e9'
        const WECOM_TEST_WEBHOOK = 'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=93585dca-b50b-4900-994c-fc90c0542f73'

        const sendWecomNotify = () => {
          const now = new Date()
          const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`
          const ua = navigator.userAgent
          const browser = ua.includes('Chrome') ? 'Chrome' : ua.includes('Firefox') ? 'Firefox' : ua.includes('Safari') ? 'Safari' : '其他'
          const os = ua.includes('Windows') ? 'Windows' : ua.includes('Mac') ? 'Mac' : ua.includes('Linux') ? 'Linux' : '其他'

          const payload = {
            msgtype: 'markdown',
            markdown: {
              content: `### 📬 美羊新手向导通知\n> **有人点击了「前往注册」**\n\n**时间：** ${timeStr}\n**浏览器：** ${browser}\n**系统：** ${os}\n**页面：** 美羊AI学习力系统新手向导`
            }
          }

          // 用 no-cors 模式绕过 CORS 限制，同时用 sendBeacon 双保险
          const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' })
          navigator.sendBeacon(WECOM_WEBHOOK, blob)
          fetch(WECOM_WEBHOOK, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(payload)
          }).catch(() => {})
        }

        // ===== 在线测试状态 =====
        const page = ref('home')         // home | test-list | quiz | result
        const quizIndex = ref(0)         // 当前测试的索引
        const userAnswers = reactive({}) // 用户答案 { 0: 1, 1: 2, ... }
        const userName = ref('')
        const userPhone = ref('')
        const score = ref(0)
        const correctCount = ref(0)
        const totalScore = ref(100)
        const pushStatus = ref('')

        // 持久化测试结果
        const STORAGE_KEY = 'meiyang_quiz_results'
        const quizResults = reactive(JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'))

        const saveQuizResult = (idx, result) => {
          quizResults[idx] = result
          localStorage.setItem(STORAGE_KEY, JSON.stringify(quizResults))
        }

        const clearAllResults = () => {
          Object.keys(quizResults).forEach(k => delete quizResults[k])
          localStorage.removeItem(STORAGE_KEY)
        }

        const quizzes = quizBank
        const currentQuiz = computed(() => quizzes[quizIndex.value])

        const answeredCount = computed(() => {
          if (!currentQuiz.value) return 0
          let count = 0
          for (let i = 0; i < currentQuiz.value.questions.length; i++) {
            if (userAnswers[i] !== undefined) count++
          }
          return count
        })

        const canSubmit = computed(() => {
          if (!currentQuiz.value) return false
          if (!userPhone.value.trim()) return false
          return answeredCount.value === currentQuiz.value.questions.length
        })

        const optionLabel = (idx) => {
          if (idx === undefined || idx === null) return '?'
          return String.fromCharCode(65 + idx) // A, B, C, D...
        }

        const startQuiz = (idx) => {
          quizIndex.value = idx
          // 清空之前的答案
          Object.keys(userAnswers).forEach(k => delete userAnswers[k])
          userName.value = ''
          userPhone.value = ''
          score.value = 0
          correctCount.value = 0
          pushStatus.value = ''
          page.value = 'quiz'
          // 滚动到顶部
          window.scrollTo({ top: 0, behavior: 'smooth' })
        }

        const submitQuiz = () => {
          const quiz = currentQuiz.value
          let correct = 0
          quiz.questions.forEach((q, i) => {
            if (userAnswers[i] === q.answer) correct++
          })
          correctCount.value = correct
          score.value = correct * 10
          totalScore.value = quiz.questions.length * 10

          // 持久化保存结果
          saveQuizResult(quizIndex.value, {
            name: quiz.name,
            score: score.value,
            correct: correct,
            total: quiz.questions.length,
            phone: userPhone.value,
            time: new Date().toLocaleString('zh-CN')
          })

          // 推送企业微信
          pushToWecom(quiz, correct)

          page.value = 'result'
          window.scrollTo({ top: 0, behavior: 'smooth' })
        }

        const pushToWecom = (quiz, correct) => {
          const now = new Date()
          const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`
          const total = quiz.questions.length
          const sc = correct * 10

          // 构建答题详情
          let detailLines = ''
          quiz.questions.forEach((q, i) => {
            const userAns = userAnswers[i]
            const userOpt = userAns !== undefined ? q.options[userAns] : '未作答'
            const correctOpt = q.options[q.answer]
            const icon = userAns === q.answer ? '✅' : '❌'
            detailLines += `\n> ${icon} **第${i+1}题：** ${q.text}`
            detailLines += `\n> 你的答案：${userOpt} | 正确答案：${correctOpt}`
          })

          const content = `### 📝 在线测试成绩通知\n> **测试名称：** ${quiz.name}\n> **用户姓名：** ${userName.value || '未填写'}\n> **手机号：** ${userPhone.value}\n> **得分：** ${sc}/${total*10}（${correct}/${total}）\n> **时间：** ${timeStr}\n${detailLines}`

          const payload = { msgtype: 'markdown', markdown: { content } }

          pushStatus.value = '正在推送成绩...'
          try {
            // sendBeacon + no-cors fetch 双保险推送
            const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' })
            navigator.sendBeacon(WECOM_TEST_WEBHOOK, blob)
            fetch(WECOM_TEST_WEBHOOK, {
              method: 'POST',
              mode: 'no-cors',
              headers: { 'Content-Type': 'text/plain' },
              body: JSON.stringify(payload)
            }).then(() => {
              pushStatus.value = '成绩已推送至企业微信 ✅'
            }).catch(() => {
              pushStatus.value = '推送失败，请检查网络 ⚠️'
            })
          } catch (e) {
            pushStatus.value = '推送失败，请检查网络 ⚠️'
          }
        }

        const retryQuiz = () => {
          Object.keys(userAnswers).forEach(k => delete userAnswers[k])
          score.value = 0
          correctCount.value = 0
          pushStatus.value = ''
          page.value = 'quiz'
          window.scrollTo({ top: 0, behavior: 'smooth' })
        }

        const submitFeedback = () => {
          if (!feedbackPhone.value.trim() || !feedbackContent.value.trim()) return
          feedbackSubmitting.value = true
          const now = new Date()
          const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`

          const payload = {
            msgtype: 'markdown',
            markdown: {
              content: `### 💬 在线反馈通知\n> **姓名：** ${feedbackName.value || '未填写'}\n> **手机号：** ${feedbackPhone.value}\n> **时间：** ${timeStr}\n> **反馈内容：**\n> ${feedbackContent.value.replace(/\n/g, '\n> ')}`
            }
          }

          const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' })
          navigator.sendBeacon(WECOM_WEBHOOK, blob)
          fetch(WECOM_WEBHOOK, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(payload)
          }).catch(() => {})

          feedbackDialogVisible.value = false
          feedbackName.value = ''
          feedbackPhone.value = ''
          feedbackContent.value = ''
          feedbackSubmitting.value = false
          feedbackQrVisible.value = true
        }

        return {
          dialogVisible, registerDialogVisible, manualLinks, openLink, sendWecomNotify,
          // 反馈相关
          feedbackDialogVisible, feedbackName, feedbackPhone, feedbackContent,
          feedbackSubmitting, feedbackQrVisible, submitFeedback,
          // 测试相关
          page, quizzes, quizIndex, currentQuiz, userAnswers,
          userName, userPhone, score, correctCount, totalScore, pushStatus,
          quizResults, clearAllResults,
          answeredCount, canSubmit, optionLabel,
          startQuiz, submitQuiz, retryQuiz
        }
      }
    })

    app.use(ElementPlus)
    app.mount('#app')
  </script>
</body>
</html>
